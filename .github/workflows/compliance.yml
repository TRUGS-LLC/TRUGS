name: Dark Code compliance

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  compliance:
    runs-on: ubuntu-latest
    name: trug compliance
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install trugs-tools
        run: pip install "trugs-tools>=2.0.0"

      - name: Run trug compliance
        run: trug compliance .

      - name: Upload detailed report
        if: failure()
        run: trug compliance --json . > compliance-report.json
        continue-on-error: true

      - name: Attach report artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: compliance-report
          path: compliance-report.json

  tests:
    runs-on: ubuntu-latest
    name: pytest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install
        run: pip install pytest

      - name: Run build-tool tests
        run: pytest tools/test_build_language_trug.py -v
